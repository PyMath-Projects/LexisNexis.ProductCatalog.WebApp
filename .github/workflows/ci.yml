name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore ProductCatalog.sln

      - name: Build
        run: dotnet build ProductCatalog.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test ProductCatalog.sln --configuration Release --no-build --verbosity normal

      - name: Create versioned release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: v0.1.${{ github.run_number }}
        run: |
          git tag "${VERSION}"
          git push origin "${VERSION}"
          gh release create "${VERSION}" \
            --title "Product Catalog ${VERSION}" \
            --generate-notes
